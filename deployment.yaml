apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: NAMESPACE
  name: APP
  labels:
    k8s-app: APP
    qcloud-app: APP
    ly-apl: APL
    ly-project: PROJECT
  annotations:
    imageRegistry: IMAGE_REGISTRY
    buildGitBranch: BUILD_GIT_BRANCH
    buildUser: BUILD_USER
    buildTimestamp: BUILD_TIMESTAMP
spec:
  # pod数量
  replicas: 1
  selector:
    matchLabels:
      k8s-app: APP
      qcloud-app: APP
  strategy:
    # 更新策略 滚动更新 启动新的Pod,停止旧的Pod
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        k8s-app: APP
        qcloud-app: APP
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: ly.environment
                    operator: In
                    values:
                      - test
                      - ENVIRONMENT
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: ly.purpose
                    operator: In
                    values:
                      - node
      containers:
        - name: APP
          image: IMAGE
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "0.1"
              memory: 100Mi
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: SERVER_PORT
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: SERVER_PORT
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          securityContext:
            privileged: false
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: qcloudregistrykey
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: { }
      terminationGracePeriodSeconds: 30


---
apiVersion: v1
kind: Service
metadata:
  namespace: NAMESPACE
  name: APP
  labels:
    k8s-app: APP
    qcloud-app: APP
spec:
  ports:
    - port: SERVER_PORT
      targetPort: SERVER_PORT
      name: APP
  selector:
    k8s-app: APP
    qcloud-app: APP
  type: NodePort
